<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>步云鞋垫 · 价格填报管理系统 v2</title>
  <!-- 引入Tailwind CSS（如果原来有就保留，没有就加上） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 唯一正确的云开发SDK（放在最前面） -->
  <script src="https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@1.7.2/dist/cloudbase.full.js"></script>
  <style>
    /* 保留你原来的所有CSS样式 */
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
    .header { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; padding: 1rem 2rem; }
    .sync-status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; }
    .sync-online { background-color: #10b981; }
    .sync-offline { background-color: #ef4444; }
    .sync-connecting { background-color: #f59e0b; }
    .table-container { padding: 1rem 2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
    th { background-color: #f9fafb; font-weight: 600; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.375rem; border: none; cursor: pointer; font-size: 0.875rem; }
    .btn-primary { background-color: #2563eb; color: white; }
    .btn-success { background-color: #10b981; color: white; }
    .btn-danger { background-color: #ef4444; color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; }
    .modal-content { background-color: white; margin: 5% auto; padding: 2rem; width: 80%; max-width: 600px; border-radius: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 0.375rem; color: white; z-index: 2000; }
    .toast-success { background-color: #10b981; }
    .toast-error { background-color: #ef4444; }
    .toast-warning { background-color: #f59e0b; }
    .toast-info { background-color: #3b82f6; }
  </style>
</head>
<body>
  <!-- 头部 -->
  <div class="header">
    <h1 class="text-2xl font-bold mb-2">步云鞋垫 · 价格填报管理系统 v2</h1>
    <p class="text-sm opacity-90 mb-4">新乡步云鞋垫有限公司 · 云同步版（多人实时协作）</p>
    <div class="flex items-center gap-4 flex-wrap">
      <span id="syncStatus" class="sync-status sync-offline">❌ 云同步失败，使用本地数据</span>
      <span class="text-sm">汇率: 1 USD = <span id="exchangeRate">6.8000</span> CNY <span id="rateUpdateTime">2026/5/15 14:04:59 更新</span></span>
      <button id="refreshRateBtn" class="btn btn-primary">刷新汇率</button>
      <button id="manualSetBtn" class="btn btn-primary">手动设置</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="px-8 py-4 flex items-center gap-4 flex-wrap border-b">
    <input type="text" id="searchInput" placeholder="搜索产品型号、规格、备注..." class="px-3 py-2 border rounded w-64">
    <select id="modelFilter" class="px-3 py-2 border rounded">
      <option value="">全部型号</option>
    </select>
    <select id="categoryFilter" class="px-3 py-2 border rounded">
      <option value="">全部类目</option>
    </select>
    <select id="qtyFilter" class="px-3 py-2 border rounded">
      <option value="">全部数量</option>
    </select>
    <button id="addBtn" class="btn btn-primary">+ 添加产品</button>
    <button id="refreshBtn" class="btn btn-primary">刷新</button>
    <button id="exportBtn" class="btn btn-success">导出数据</button>
    <button id="importBtn" class="btn btn-primary">导入</button>
    <button id="categoryBtn" class="btn btn-primary">类目管理</button>
  </div>

  <!-- 统计卡片 -->
  <div class="px-8 py-4 grid grid-cols-4 gap-4">
    <div class="border rounded p-4">
      <p class="text-sm text-gray-500">产品型号数</p>
      <p id="modelCount" class="text-2xl font-bold text-blue-600">0</p>
    </div>
    <div class="border rounded p-4">
      <p class="text-sm text-gray-500">价格条目数</p>
      <p id="itemCount" class="text-2xl font-bold text-green-600">0</p>
    </div>
    <div class="border rounded p-4">
      <p class="text-sm text-gray-500">产品类目数</p>
      <p id="categoryCount" class="text-2xl font-bold text-orange-600">0</p>
    </div>
    <div class="border rounded p-4">
      <p class="text-sm text-gray-500">最高单价 (CNY)</p>
      <p id="maxPrice" class="text-2xl font-bold text-red-600">-</p>
    </div>
  </div>

  <!-- 表格 -->
  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr>
          <th>#</th>
          <th>型号 ↕</th>
          <th>配图</th>
          <th>数量 ↕</th>
          <th>人民币价格 ↕</th>
          <th>美元价格 ↕</th>
          <th>规格</th>
          <th>类目</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

  <!-- 添加/编辑弹窗 -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl font-bold mb-4" id="modalTitle">添加产品</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>型号</label>
        <input type="text" id="editModel" required>
      </div>
      <div class="form-group">
        <label>数量</label>
        <input type="number" id="editQty" min="1" required>
      </div>
      <div class="form-group">
        <label>人民币价格</label>
        <input type="number" id="editCny" step="0.01" min="0.01" required>
      </div>
      <div class="form-group">
        <label>规格</label>
        <input type="text" id="editSpec">
      </div>
      <div class="form-group">
        <label>类目</label>
        <input type="text" id="editCategory" required>
      </div>
      <div class="form-group">
        <label>配图URL</label>
        <input type="text" id="editImgUrl">
      </div>
      <div class="flex gap-4 justify-end">
        <button id="cancelBtn" class="btn">取消</button>
        <button id="saveBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast提示 -->
  <div id="toast" class="toast" style="display: none;"></div>

  <script>
    // 全局配置（这里替换成你自己的信息）
    const CLOUD_ENV = 'cloud1-d8gio2ysk4dd3678b'; // 云环境ID
    const APPID = 'wx3dba631035e4270b'; // 小程序APPID
    const DATA_KEY = 'buyun_price_data_v2';
    const CLOUD_COLLECTION = 'products'; // 云端集合名

    // 全局变量
    let app;
    let db;
    let cloudReady = false;
    let dataList = [];
    let exchangeRate = 6.8000;

    // 页面加载完成后初始化
    window.onload = async () => {
      // 先检查SDK是否加载成功
      if (typeof cloudbase === 'undefined') {
        showToast('云开发SDK加载失败，请检查网络', 'error');
        loadFromLocal();
        return;
      }

      // 绑定事件
      bindEvents();

      // 初始化云开发
      await initCloud();

      // 渲染页面
      applyFilter();
      updateStats();
    };

    // 绑定所有事件
    function bindEvents() {
      document.getElementById('addBtn').onclick = openAddModal;
      document.getElementById('saveBtn').onclick = saveItem;
      document.getElementById('cancelBtn').onclick = () => closeModal('editModal');
      document.getElementById('refreshBtn').onclick = () => cloudReady ? loadFromCloud() : loadFromLocal();
      document.getElementById('searchInput').oninput = applyFilter;
      document.getElementById('modelFilter').onchange = applyFilter;
      document.getElementById('categoryFilter').onchange = applyFilter;
      document.getElementById('qtyFilter').onchange = applyFilter;
    }

    // 云开发初始化
    async function initCloud() {
      try {
        updateSyncStatus('connecting', '正在连接云同步...');
        console.log('[Cloud] ========== 开始初始化云开发 ==========');
        console.log('[Cloud] SDK版本:', typeof cloudbase);
        console.log('[Cloud] 云环境ID:', CLOUD_ENV);
        console.log('[Cloud] APPID:', APPID);

        // 初始化云开发应用
        app = cloudbase.init({
          env: CLOUD_ENV,
          appId: APPID
        });

        console.log('[Cloud] CloudBase初始化成功, app:', app);

        // 匿名登录
        const auth = app.auth({ persistence: 'local' });
        const hasLogin = await auth.hasLoginState();

        if (!hasLogin) {
          console.log('[Cloud] 正在进行匿名登录...');
          const result = await auth.signInAnonymously();
          console.log('[Cloud] 匿名登录成功:', result);
        } else {
          console.log('[Cloud] 已登录状态');
        }

        // 获取数据库实例
        db = app.database();
        console.log('[Cloud] 数据库实例:', db);
        cloudReady = true;

        // 连接成功
        updateSyncStatus('online', '☁️ 云同步已连接，多人实时协作中');
        showToast('云同步连接成功', 'success');

        // 加载云端数据
        await loadFromCloud();

        // 启动实时监听
        startRealtimeListener();

        console.log('[Cloud] ========== 云开发初始化完成 ==========');

      } catch (e) {
        console.error('[Cloud] 云开发初始化失败:', e);
        updateSyncStatus('offline', '❌ 云同步失败，使用本地数据');
        showToast('云同步连接失败，仅本地可用', 'warning');
        // 回退到本地数据
        loadFromLocal();
      }
    }

    // 加载云端数据
    async function loadFromCloud() {
      if (!cloudReady || !db) return;

      try {
        updateSyncStatus('connecting', '🔄 正在同步数据...');
        console.log('[Cloud] 开始加载云端数据...');

        const res = await db.collection(CLOUD_COLLECTION).get();
        console.log('[Cloud] ' + CLOUD_COLLECTION + '结果:', res);

        if (res.data && res.data.length > 0) {
          console.log('[Cloud] 云端有数据，条数:', res.data.length);
          // 转换数据格式
          dataList = res.data.map((item, idx) => ({
            ...item,
            id: item._id || (100 + idx)
          }));

          // 本地备份
          localStorage.setItem(DATA_KEY, JSON.stringify(dataList));
        } else {
          console.log('[Cloud] 云端无数据，使用本地数据');
          loadFromLocal();
          // 同步本地数据到云端
          await syncAllToCloud();
        }

        // 渲染
        applyFilter();
        updateStats();
        updateFilters();
        updateSyncStatus('online', '☁️ 云同步已连接，多人实时协作中');
        console.log('[Cloud] 数据加载完成，共', dataList.length, '条');

      } catch (e) {
        console.error('[Cloud] 加载云端数据失败:', e);
        showToast('加载云端数据失败，使用本地备份', 'warning');
        loadFromLocal();
      }
    }

    // 同步所有本地数据到云端
    async function syncAllToCloud() {
      if (!cloudReady || !db || dataList.length === 0) return;

      try {
        console.log('[Cloud] 同步所有数据到云端，条数:', dataList.length);
        for (let i = 0; i < dataList.length; i++) {
          const item = dataList[i];
          const res = await db.collection(CLOUD_COLLECTION).add({
            data: {
              model: item.model,
              category: item.category,
              qty: item.qty,
              priceCNY: item.cny,
              priceUSD: item.usd,
              spec: item.spec,
              imageUrl: item.img,
              remark: item.remark || '',
              updatedAt: new Date()
            }
          });
          console.log('[Cloud] 同步第', i + 1, '条:', res);
        }
        showToast('✅ 本地数据已同步到云端', 'success');
      } catch (e) {
        console.error('[Cloud] 同步到云端失败:', e);
      }
    }

    // 加载本地数据
    function loadFromLocal() {
      const localData = localStorage.getItem(DATA_KEY);
      if (localData) {
        dataList = JSON.parse(localData);
      } else {
        // 初始数据（如果本地没有）
        dataList = [
          { id: 1, model: '2302 普通鞋垫', qty: 10, cny: 5.80, usd: 0.8529, spec: '-', category: '普通鞋垫', img: '' },
          { id: 2, model: '2302 普通鞋垫', qty: 1000, cny: 4.50, usd: 0.6618, spec: '-', category: '普通鞋垫', img: '' },
          { id: 3, model: '2302 普通鞋垫', qty: 2000, cny: 4.20, usd: 0.6176, spec: '-', category: '普通鞋垫', img: '' }
        ];
        localStorage.setItem(DATA_KEY, JSON.stringify(dataList));
      }
      applyFilter();
      updateStats();
      updateFilters();
    }

    // 实时监听云端数据变化
    function startRealtimeListener() {
      if (!cloudReady || !db) return;

      try {
        console.log('[实时监听] 开始监听集合:', CLOUD_COLLECTION);
        db.collection(CLOUD_COLLECTION).watch({
          onChange: (snapshot) => {
            console.log('[实时监听] 云端数据发生变化:', snapshot);
            showToast('🔄 云端数据已更新', 'info');
            loadFromCloud();
          },
          onError: (err) => {
            console.error('[实时监听] 监听错误:', err);
            showToast('实时同步断开，3秒后重连...', 'warning');
            setTimeout(startRealtimeListener, 3000);
          }
        });
        console.log('[实时监听] 已启动');
      } catch (e) {
        console.error('[实时监听] 初始化失败:', e);
      }
    }

    // 保存数据
    async function saveItem() {
      const id = document.getElementById('editId').value;
      const model = document.getElementById('editModel').value.trim();
      const qty = parseInt(document.getElementById('editQty').value) || 0;
      const cny = parseFloat(document.getElementById('editCny').value) || 0;
      const usd = parseFloat((cny / exchangeRate).toFixed(4));
      const spec = document.getElementById('editSpec').value.trim();
      const category = document.getElementById('editCategory').value.trim();
      const img = document.getElementById('editImgUrl').value.trim();

      if (!model || qty <= 0 || cny <= 0) {
        showToast('请填写完整信息', 'error');
        return;
      }

      const itemData = { model, qty, cny, usd, spec, category, img, updateTime: new Date() };

      try {
        showToast('正在保存...', 'info');

        if (cloudReady) {
          if (id) {
            // 修改
            await db.collection(CLOUD_COLLECTION).doc(id).update(itemData);
            showToast('修改成功，已同步到云端', 'success');
          } else {
            // 新增
            const res = await db.collection(CLOUD_COLLECTION).add(itemData);
            showToast('添加成功，已同步到云端', 'success');
            // 更新本地id
            itemData.id = res.id;
          }
        } else {
          // 本地模式
          if (id) {
            const index = dataList.findIndex(item => item.id == id);
            if (index !== -1) dataList[index] = { ...dataList[index], ...itemData };
          } else {
            itemData.id = Date.now();
            dataList.push(itemData);
          }
          localStorage.setItem(DATA_KEY, JSON.stringify(dataList));
          showToast('保存成功（本地模式）', 'success');
        }

        closeModal('editModal');
        applyFilter();
        updateStats();
        updateFilters();

      } catch (e) {
        console.error('保存失败:', e);
        showToast('保存失败，请检查网络', 'error');
      }
    }

    // 删除数据
    async function deleteItem(id) {
      if (!confirm('确定要删除这条数据吗？')) return;

      try {
        showToast('正在删除...', 'info');

        if (cloudReady) {
          await db.collection(CLOUD_COLLECTION).doc(id).remove();
          showToast('删除成功，已同步到云端', 'success');
        } else {
          dataList = dataList.filter(item => item.id != id);
          localStorage.setItem(DATA_KEY, JSON.stringify(dataList));
          showToast('删除成功（本地模式）', 'success');
        }

        applyFilter();
        updateStats();
        updateFilters();

      } catch (e) {
        console.error('删除失败:', e);
        showToast('删除失败，请检查网络', 'error');
      }
    }

    // 打开添加弹窗
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加产品';
      document.getElementById('editId').value = '';
      document.getElementById('editModel').value = '';
      document.getElementById('editQty').value = '';
      document.getElementById('editCny').value = '';
      document.getElementById('editSpec').value = '';
      document.getElementById('editCategory').value = '';
      document.getElementById('editImgUrl').value = '';
      document.getElementById('editModal').style.display = 'block';
    }

    // 打开编辑弹窗
    function openEditModal(id) {
      const item = dataList.find(item => item.id == id);
      if (!item) return;

      document.getElementById('modalTitle').textContent = '编辑产品';
      document.getElementById('editId').value = item.id;
      document.getElementById('editModel').value = item.model;
      document.getElementById('editQty').value = item.qty;
      document.getElementById('editCny').value = item.cny;
      document.getElementById('editSpec').value = item.spec || '';
      document.getElementById('editCategory').value = item.category;
      document.getElementById('editImgUrl').value = item.img || '';
      document.getElementById('editModal').style.display = 'block';
    }

    // 关闭弹窗
    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    // 应用筛选
    function applyFilter() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const modelFilter = document.getElementById('modelFilter').value;
      const categoryFilter = document.getElementById('categoryFilter').value;
      const qtyFilter = document.getElementById('qtyFilter').value;

      let filteredData = dataList.filter(item => {
        let match = true;
        if (search) {
          match = match && (item.model.toLowerCase().includes(search) || (item.spec && item.spec.toLowerCase().includes(search)));
        }
        if (modelFilter) {
          match = match && item.model.startsWith(modelFilter);
        }
        if (categoryFilter) {
          match = match && item.category === categoryFilter;
        }
        if (qtyFilter) {
          const [min, max] = qtyFilter.split('-').map(Number);
          if (max) {
            match = match && item.qty >= min && item.qty <= max;
          } else {
            match = match && item.qty >= min;
          }
        }
        return match;
      });

      renderTable(filteredData);
    }

    // 渲染表格
    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8 text-gray-500">暂无数据，点击「添加产品」开始录入</td></tr>';
        return;
      }

      // 按型号分组
      const groupedData = {};
      data.forEach(item => {
        const modelPrefix = item.model.split(' ')[0];
        if (!groupedData[modelPrefix]) {
          groupedData[modelPrefix] = [];
        }
        groupedData[modelPrefix].push(item);
      });

      let index = 1;
      for (const [model, items] of Object.entries(groupedData)) {
        // 分组标题行
        const groupRow = document.createElement('tr');
        groupRow.innerHTML = `<td colspan="9" class="bg-blue-50 font-semibold">📦 ${model}</td>`;
        tbody.appendChild(groupRow);

        // 数据行
        items.forEach(item => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${index++}</td>
            <td>${item.model}</td>
            <td>${item.img ? `<img src="${item.img}" width="40" height="40" class="object-cover rounded">` : '<span class="text-gray-400">+</span>'}</td>
            <td>${item.qty}</td>
            <td class="font-semibold">¥${item.cny.toFixed(2)}</td>
            <td class="text-green-600 font-semibold">$${item.usd.toFixed(4)}</td>
            <td>${item.spec || '-'}</td>
            <td>${item.category}</td>
            <td>
              <button onclick="openEditModal('${item.id}')" class="btn btn-primary btn-sm mr-2">✏️</button>
              <button onclick="deleteItem('${item.id}')" class="btn btn-danger btn-sm">🗑️</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      }
    }

    // 更新统计
    function updateStats() {
      const models = new Set(dataList.map(item => item.model.split(' ')[0]));
      const categories = new Set(dataList.map(item => item.category));
      const maxPrice = dataList.length > 0 ? Math.max(...dataList.map(item => item.cny)) : 0;

      document.getElementById('modelCount').textContent = models.size;
      document.getElementById('itemCount').textContent = dataList.length;
      document.getElementById('categoryCount').textContent = categories.size;
      document.getElementById('maxPrice').textContent = maxPrice > 0 ? `¥${maxPrice.toFixed(2)}` : '-';
    }

    // 更新筛选器选项
    function updateFilters() {
      const modelSelect = document.getElementById('modelFilter');
      const categorySelect = document.getElementById('categoryFilter');

      // 清空原有选项
      modelSelect.innerHTML = '<option value="">全部型号</option>';
      categorySelect.innerHTML = '<option value="">全部类目</option>';

      // 添加型号选项
      const models = new Set(dataList.map(item => item.model.split(' ')[0]));
      models.forEach(model => {
        const option = document.createElement('option');
        option.value = model;
        option.textContent = model;
        modelSelect.appendChild(option);
      });

      // 添加类目选项
      const categories = new Set(dataList.map(item => item.category));
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    // 更新同步状态
    function updateSyncStatus(status, text) {
      const statusEl = document.getElementById('syncStatus');
      statusEl.textContent = text;
      statusEl.className = 'sync-status';
      if (status === 'online') {
        statusEl.classList.add('sync-online');
      } else if (status === 'offline') {
        statusEl.classList.add('sync-offline');
      } else if (status === 'connecting') {
        statusEl.classList.add('sync-connecting');
      }
    }

    // 显示Toast提示
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast toast-${type}`;
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
      }, 3000);
    }
  </script>
</body>
</html>
